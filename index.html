<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars - Classroom Battle</title>
    <style>
        :root {
            --blue: #0084ff; --red: #ff3c3c; --yellow: #ffd700; --green: #4caf50; --dark: #222;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Arial Black', Gadget, sans-serif; background-color: #000; color: white; user-select: none;
        }

        .screen {
            display: none; width: 100vw; height: 100vh; background-size: cover;
            background-position: center; position: absolute; flex-direction: column; align-items: center; justify-content: center;
        }

        .active { display: flex; }
        #home-screen { background-image: url('home_bg.png'); }
        #battle-screen { background-image: url('game_bg.png'); }
        #victory-screen { background-image: url('victory_bg.png'); }

        .panel {
            background: rgba(0, 0, 0, 0.85); padding: 30px; border-radius: 20px;
            border: 5px solid var(--yellow); text-align: center; max-width: 90%; max-height: 85%; overflow-y: auto;
        }

        .btn {
            background: var(--yellow); color: #000; padding: 15px 30px; margin: 10px;
            border: none; border-radius: 50px; font-size: 28px; font-weight: bold;
            cursor: pointer; transition: 0.1s; box-shadow: 0 5px 0 #b39700;
        }
        .btn:active { transform: translateY(3px); box-shadow: none; }

        /* HEROES */
        .stage {
            display: flex; justify-content: space-around; align-items: flex-end;
            width: 100%; height: 45%; margin-top: 50px;
        }
        .hero { width: 450px; height: 450px; object-fit: contain; transition: 0.3s; z-index: 2; position: relative; }
        .frozen-effect { filter: brightness(1.2) sepia(1) hue-rotate(180deg); opacity: 0.7; }
        .attack-left { transform: translateX(250px) scale(1.1); }
        .attack-right { transform: translateX(-250px) scale(1.1); }

        /* HUD */
        .hud { position: absolute; top: 20px; width: 95%; display: flex; justify-content: space-between; z-index: 10; }
        .team-box { width: 420px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border: 5px solid white; }
        .t1-border { border-color: var(--blue); }
        .t2-border { border-color: var(--red); }
        
        .skill-row { display: flex; gap: 15px; margin-top: 10px; justify-content: center; }
        .skill-btn {
            width: 85px; height: 85px; border-radius: 50%; border: 4px solid white;
            cursor: pointer; background-size: cover; position: relative; background-color: #444;
        }
        .skill-btn:disabled { filter: grayscale(1); opacity: 0.4; cursor: not-allowed; }
        
        .bar-container { width: 100%; height: 30px; background: #333; margin: 8px 0; border-radius: 15px; overflow: hidden; border: 2px solid #000; }
        .hp-bar { height: 100%; background: var(--green); transition: 0.5s; width: 100%; }
        .en-bar { height: 100%; background: var(--yellow); transition: 0.5s; width: 0%; }

        /* POPUP QUESTIONS */
        .question-box {
            background: white; color: #222; padding: 30px; border-radius: 30px;
            width: 650px; min-height: 550px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; border: 12px solid var(--dark);
            position: absolute; top: 50%; transform: translateY(-50%); z-index: 50;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
        }
        #q-box-1 { left: 2%; border-color: var(--blue); }
        #q-box-2 { right: 2%; border-color: var(--red); }

        .q-img { max-height: 250px; margin-bottom: 20px; border: 2px solid #eee; border-radius: 10px; }
        .q-text-style { font-size: 40px; font-weight: 900; margin-bottom: 25px; text-align: center; text-transform: uppercase; color: #000; line-height: 1.2; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
        .opt-btn { 
            padding: 20px; font-size: 32px; cursor: pointer; border: 4px solid #333; 
            border-radius: 20px; background: #fff; font-weight: bold; 
            transition: 0.1s; display: flex; align-items: center; justify-content: center;
        }
        .opt-btn:hover { background: var(--yellow); border-color: #000; }
        .opt-btn img { height: 120px; width: auto; object-fit: contain; }

        .hidden { display: none !important; }
        .damage-text { position: absolute; font-size: 80px; color: red; font-weight: bold; animation: floatUp 1s forwards; z-index: 100; text-shadow: 3px 3px #000; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
        
        .frozen-label { position: absolute; top: -60px; left: 50%; transform: translateX(-50%); background: var(--blue); color: white; padding: 10px 30px; border-radius: 15px; font-size: 40px; font-weight: bold; z-index: 10; animation: blink 0.5s infinite; border: 4px solid white; }

        /* EDITOR STYLES */
        .editor-container { width: 100%; max-height: 500px; overflow-y: auto; margin-top: 20px; background: #222; border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #444; text-align: left; }
        th { background: #333; position: sticky; top: 0; }
        .edit-input { background: #000; color: #0f0; border: 1px solid #555; width: 95%; padding: 5px; font-family: monospace; }
    </style>
</head>
<body>

    <audio id="music-bg" loop src="snd_bgmusic.mp3"></audio>
    <audio id="sfx-click" src="snd_click.mp3"></audio>
    <audio id="sfx-correct" src="snd_correct.mp3"></audio>
    <audio id="sfx-wrong" src="snd_wrong.mp3"></audio>
    <audio id="sfx-attack" src="snd_attack.mp3"></audio>
    <audio id="sfx-freeze" src="snd_freeze.mp3"></audio>
    <audio id="sfx-ultimate" src="snd_ultimate.mp3"></audio>
    <audio id="sfx-victory" src="snd_victory.mp3"></audio>

    <div id="home-screen" class="screen active">
        <h1 style="font-size: 100px; color: var(--yellow); text-shadow: 8px 8px #000;">BRAWL STARS</h1>
        <button class="btn" onclick="startGame()">START BATTLE</button>
        <button class="btn" onclick="showScreen('char-screen')">CHARACTERS</button>
        <button class="btn" onclick="showScreen('editor-screen')">EDIT QUESTIONS</button>
        <button class="btn" onclick="toggleMute()" id="mute-btn">SOUND: ON</button>
    </div>

    <div id="editor-screen" class="screen" style="background: #111;">
        <div class="panel" style="width: 95%;">
            <h2 style="font-size: 40px;">QUESTION EDITOR</h2>
            <p>Edit the fields below. They save automatically!</p>
            <button class="btn" onclick="resetQuestions()">Reset to Defaults</button>
            <button class="btn" onclick="showScreen('home-screen')">Back to Home</button>
            <div class="editor-container">
                <table id="editor-table">
                    <thead>
                        <tr>
                            <th>Image Filename</th>
                            <th>Question Text</th>
                            <th>Correct Answer</th>
                            <th>Choices (Comma separated)</th>
                        </tr>
                    </thead>
                    <tbody id="editor-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="char-screen" class="screen">
        <div class="panel">
            <h2 id="char-title" style="font-size: 40px;">TEAM 1: CHOOSE HERO</h2>
            <div id="char-grid" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px;"></div>
            <button class="btn" onclick="selectNextHero()">NEXT</button>
        </div>
    </div>

    <div id="battle-screen" class="screen">
        <div class="hud">
            <div class="team-box t1-border" id="t1-panel">
                <h2 style="font-size: 32px; margin: 0;">TEAM BLUE</h2>
                <div class="bar-container"><div id="t1-hp" class="hp-bar"></div></div>
                <div class="bar-container"><div id="t1-en" class="en-bar"></div></div>
                <div class="skill-row">
                    <button class="skill-btn" id="t1-s1" style="background-image:url('icon_quick_strike.png')" onclick="openQuestion(1, 1)"></button>
                    <button class="skill-btn" id="t1-s2" style="background-image:url('icon_power_blast.png')" onclick="openQuestion(1, 2)"></button>
                    <button class="skill-btn" id="t1-s3" style="background-image:url('icon_freeze_trap.png')" onclick="openQuestion(1, 3)"></button>
                    <button class="skill-btn" id="t1-s4" style="background-image:url('icon_ultimate.png')" onclick="openQuestion(1, 4)"></button>
                </div>
            </div>
            <div class="team-box t2-border" id="t2-panel" style="text-align: right;">
                <h2 style="font-size: 32px; margin: 0;">TEAM RED</h2>
                <div class="bar-container"><div id="t2-hp" class="hp-bar"></div></div>
                <div class="bar-container"><div id="t2-en" class="en-bar"></div></div>
                <div class="skill-row" style="flex-direction: row-reverse;">
                    <button class="skill-btn" id="t2-s1" style="background-image:url('icon_quick_strike.png')" onclick="openQuestion(2, 1)"></button>
                    <button class="skill-btn" id="t2-s2" style="background-image:url('icon_power_blast.png')" onclick="openQuestion(2, 2)"></button>
                    <button class="skill-btn" id="t2-s3" style="background-image:url('icon_freeze_trap.png')" onclick="openQuestion(2, 3)"></button>
                    <button class="skill-btn" id="t2-s4" style="background-image:url('icon_ultimate.png')" onclick="openQuestion(2, 4)"></button>
                </div>
            </div>
        </div>
        <div class="stage">
            <div style="position:relative"><div id="t1-frozen-ui" class="frozen-label hidden">FROZEN!</div><img id="p1-sprite" class="hero" src="player_1.gif"></div>
            <div style="position:relative"><div id="t2-frozen-ui" class="frozen-label hidden">FROZEN!</div><img id="p2-sprite" class="hero" src="player_2.gif"></div>
        </div>
        <div id="q-box-1" class="question-box hidden"><img id="q-img-1" class="q-img"><div id="q-text-1" class="q-text-style"></div><div id="options-1" class="options-grid"></div></div>
        <div id="q-box-2" class="question-box hidden"><img id="q-img-2" class="q-img"><div id="q-text-2" class="q-text-style"></div><div id="options-2" class="options-grid"></div></div>
    </div>

    <div id="victory-screen" class="screen">
        <h1 style="font-size: 150px; color: var(--yellow); text-shadow: 10px 10px #000;">VICTORY!</h1>
        <h2 id="winner-name" style="font-size: 70px;">TEAM BLUE</h2>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        // --- DATA ---
        const singulars = ['cap','scarf','sunglasses','blouse','polo_shirt','belt'];
        const plurals = ['trousers','gloves','socks','boots'];

        function generateDefaults() {
            let qb = [];
            [...singulars, ...plurals].forEach(item => {
                let name = item.replace('_',' ');
                let isPlural = plurals.includes(item);
                let sentence = isPlural ? `I'm wearing ________.` : `I'm wearing a ________.`;
                
                // Add 4 versions for variety
                qb.push({ img: item+'.png', q: "What is this?", ans: name, opts: `${name},hat,shirt,shoes` });
                qb.push({ img: item+'.png', q: sentence, ans: name, opts: `${name},pencil,apple,ruler` });
                qb.push({ img: '', q: `Which one is: ${name}?`, ans: item+'.png', opts: `${item}.png,cap.png,socks.png,belt.png` });
                qb.push({ img: item+'.png', q: "Look at the picture:", ans: name, opts: `${name},jacket,bag,watch` });
            });
            return qb;
        }

        let state = {
            t1: { hp: 100, en: 0, hero: "player_1.gif", frozen: false, activeSkill: null },
            t2: { hp: 100, en: 0, hero: "player_2.gif", frozen: false, activeSkill: null },
            isMuted: false, selectingFor: 1, questions: [], userQuestions: []
        };

        // --- EDITOR LOGIC ---
        function loadUserQuestions() {
            let saved = localStorage.getItem('brawl_v5_data');
            state.userQuestions = saved ? JSON.parse(saved) : generateDefaults();
        }

        function buildEditor() {
            const body = document.getElementById('editor-body');
            body.innerHTML = '';
            state.userQuestions.forEach((q, index) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><input class="edit-input" value="${q.img}" onchange="updateQuest(${index}, 'img', this.value)"></td>
                    <td><input class="edit-input" value="${q.q}" onchange="updateQuest(${index}, 'q', this.value)"></td>
                    <td><input class="edit-input" value="${q.ans}" onchange="updateQuest(${index}, 'ans', this.value)"></td>
                    <td><input class="edit-input" value="${q.opts}" onchange="updateQuest(${index}, 'opts', this.value)"></td>
                `;
                body.appendChild(tr);
            });
        }

        function updateQuest(index, field, value) {
            state.userQuestions[index][field] = value;
            localStorage.setItem('brawl_v5_data', JSON.stringify(state.userQuestions));
        }

        function resetQuestions() {
            if(confirm("Reset all questions to default?")) {
                localStorage.removeItem('brawl_v5_data');
                loadUserQuestions();
                buildEditor();
            }
        }

        // --- GAME LOGIC ---
        function startGame() {
            loadUserQuestions();
            state.questions = [...state.userQuestions].sort(() => Math.random() - 0.5);
            state.t1.hp = 100; state.t2.hp = 100;
            state.t1.en = 0; state.t2.en = 0;
            document.getElementById('p1-sprite').src = state.t1.hero;
            document.getElementById('p2-sprite').src = state.t2.hero;
            showScreen('battle-screen');
            updateUI();
            if(!state.isMuted) document.getElementById('music-bg').play();
        }

        function openQuestion(teamIdx, skillIdx) {
            if(state[`t${teamIdx}`].frozen) return;
            playSfx('sfx-click');
            state[`t${teamIdx}`].activeSkill = skillIdx;
            
            if(state.questions.length < 2) state.questions = [...state.userQuestions].sort(()=>Math.random()-0.5);
            let q = state.questions.pop();

            const box = document.getElementById(`q-box-${teamIdx}`);
            const img = document.getElementById(`q-img-${teamIdx}`);
            const text = document.getElementById(`q-text-${teamIdx}`);
            const grid = document.getElementById(`options-${teamIdx}`);

            box.classList.remove('hidden');
            text.innerText = q.q;
            if(q.img && q.img.includes('.png')) { img.src = q.img; img.classList.remove('hidden'); }
            else { img.classList.add('hidden'); }

            grid.innerHTML = '';
            q.opts.split(',').sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                if(o.includes('.png')) b.innerHTML = `<img src="${o}">`;
                else b.innerText = o;
                b.onclick = () => {
                    box.classList.add('hidden');
                    if(o === q.ans) { playSfx('sfx-correct'); applyAttack(teamIdx); }
                    else { playSfx('sfx-wrong'); showFloatingText(teamIdx, "MISS!"); togglePanel(teamIdx, true); }
                };
                grid.appendChild(b);
            });
            togglePanel(teamIdx, false);
        }

        function applyAttack(atkIdx) {
            const defIdx = atkIdx === 1 ? 2 : 1;
            const skill = state[`t${atkIdx}`].activeSkill;
            let dmg = 0, en = 0, sfx = 'sfx-attack';

            if(skill === 1) { dmg = rand(8,12); en = 15; }
            if(skill === 2) { dmg = rand(15,22); en = 25; }
            if(skill === 3) { dmg = rand(10,15); en = 20; if(Math.random()<0.4) { freeze(defIdx); sfx='sfx-freeze'; } }
            if(skill === 4) { dmg = rand(35,50); en = -100; sfx='sfx-ultimate'; }

            playSfx(sfx);
            const s = document.getElementById(`p${atkIdx}-sprite`);
            s.classList.add(atkIdx===1?'attack-left':'attack-right');
            setTimeout(()=>s.classList.remove('attack-left','attack-right'),300);

            state[`t${defIdx}`].hp -= dmg;
            state[`t${atkIdx}`].en = Math.max(0, Math.min(100, state[`t${atkIdx}`].en + en));
            showFloatingText(defIdx, `-${dmg}`);
            updateUI();
            if(state[`t${defIdx}`].hp <= 0) endGame(atkIdx);
            else togglePanel(atkIdx, true);
        }

        function freeze(idx) {
            state[`t${idx}`].frozen = true;
            document.getElementById(`p${idx}-sprite`).classList.add('frozen-effect');
            document.getElementById(`t${idx}-frozen-ui`).classList.remove('hidden');
            document.getElementById(`q-box-${idx}`).classList.add('hidden');
            togglePanel(idx, false);
            setTimeout(() => {
                state[`t${idx}`].frozen = false;
                document.getElementById(`p${idx}-sprite`).classList.remove('frozen-effect');
                document.getElementById(`t${idx}-frozen-ui`).classList.add('hidden');
                togglePanel(idx, true);
            }, 5000);
        }

        function updateUI() {
            for(let i=1; i<=2; i++) {
                document.getElementById(`t${i}-hp`).style.width = state[`t${i}`].hp + '%';
                document.getElementById(`t${i}-en`).style.width = state[`t${i}`].en + '%';
                document.getElementById(`t${i}-s4`).disabled = state[`t${i}`].en < 100;
            }
        }

        function togglePanel(idx, on) {
            const p = document.getElementById(`t${idx}-panel`);
            p.style.opacity = on ? "1" : "0.3";
            p.style.pointerEvents = on ? "auto" : "none";
        }

        function showFloatingText(idx, txt) {
            const s = document.getElementById(`p${idx}-sprite`);
            const rect = s.getBoundingClientRect();
            const d = document.createElement('div');
            d.className = 'damage-text';
            d.style.left = (rect.left + 150) + 'px';
            d.style.top = rect.top + 'px';
            d.innerText = txt;
            document.body.appendChild(d);
            setTimeout(() => d.remove(), 1000);
        }

        function endGame(w) {
            showScreen('victory-screen');
            playSfx('sfx-victory');
            document.getElementById('winner-name').innerText = "TEAM " + w;
            document.getElementById('music-bg').pause();
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'editor-screen') buildEditor();
        }

        function toggleMute() {
            state.isMuted = !state.isMuted;
            const bg = document.getElementById('music-bg');
            if(state.isMuted) { bg.pause(); document.getElementById('mute-btn').innerText="SOUND: OFF"; }
            else { bg.play(); document.getElementById('mute-btn').innerText="SOUND: ON"; }
        }

        function playSfx(id) { if(!state.isMuted) { const s=document.getElementById(id); s.currentTime=0; s.play(); } }
        function rand(m, x) { return Math.floor(Math.random() * (x - m + 1)) + m; }

        function init() {
            const grid = document.getElementById('char-grid');
            for(let i=1; i<=8; i++) {
                const d = document.createElement('div');
                d.style.border = "5px solid #555";
                d.innerHTML = `<img src="player_${i}.gif" width="120">`;
                d.onclick = () => {
                    document.querySelectorAll('#char-grid div').forEach(x => x.style.borderColor="#555");
                    d.style.borderColor = "var(--yellow)";
                    state[`t${state.selectingFor}`].hero = `player_${i}.gif`;
                    playSfx('sfx-click');
                };
                grid.appendChild(d);
            }
            loadUserQuestions();
        }

        function selectNextHero() {
            if(state.selectingFor === 1) { 
                state.selectingFor = 2; 
                document.getElementById('char-title').innerText = "TEAM 2: CHOOSE HERO"; 
            } else { 
                showScreen('home-screen'); 
                state.selectingFor = 1; 
            }
        }

        window.onload = init;
    </script>
</body>
</html>
